<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <!-- Link do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .card-cadastro { max-width: 400px; margin-top: 100px; border: none; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="card card-cadastro shadow-lg w-100">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 fw-bold text-primary">Cadastre-se</h2>
                <p class="text-center text-muted mb-4">Crie sua conta no sistema</p>

                <form action="/cadastrar" method="POST">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome de Usuário</label>
                        <input type="text" class="form-control" id="nome" name="nome" placeholder="Ex: diogo_dev" required>
                    </div>
                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" name="senha" placeholder="Sua senha secreta" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Criar Conta</button>
                </form>

                <div class="text-center mt-4">
                    <span class="text-muted">Já tem uma conta?</span> 
                    <a href="/login" class="text-decoration-none fw-bold">Entrar</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
