<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessar Sistema</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex;
            align-items: center;
        }
        .card-login { 
            max-width: 400px; 
            border-radius: 20px; 
            border: none;
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="card card-login shadow-lg w-100">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 fw-bold text-dark">Login</h2>
                
                <form action="/logar" method="POST">
                    <!-- Campo Usuário -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Usuário</label>
                        <input type="text" name="nome" class="form-control" placeholder="Seu usuário" required>
                    </div>

                    <!-- Campo Senha com Olhinho (JavaScript) -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Senha</label>
                        <div class="input-group">
                            <input type="password" id="campoSenha" name="senha" class="form-control" placeholder="Sua senha" required>
                            <button class="btn btn-outline-secondary" type="button" id="btnSenha" onclick="toggleSenha()">
                                👁️
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Entrar no Sistema</button>
                </form>

                <hr class="my-4">
                <p class="text-center mb-0">
                    Novo por aqui? <a href="/" class="link-primary fw-bold text-decoration-none">Criar uma conta</a>
                </p>
            </div>
        </div>
    </div>

    <!-- SCRIPT JAVASCRIPT: A MÁGICA DO OLHINHO -->
    <script>
        function toggleSenha() {
            // 1. Pegamos o input e o botão pelos IDs
            var input = document.getElementById("campoSenha");
            var btn = document.getElementById("btnSenha");
            
            // 2. Se o tipo for 'password', mudamos para 'text' (mostra)
            if (input.type === "password") {
                input.type = "text";
                btn.innerText = "🔒"; // Muda o ícone para cadeado
            } else {
                // 3. Se já estiver em 'text', voltamos para 'password' (esconde)
                input.type = "password";
                btn.innerText = "👁️"; // Volta para o olhinho
            }
        }
    </script>

</body>
</html>
