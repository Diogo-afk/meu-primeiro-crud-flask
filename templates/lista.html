<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo</title>
    <!-- Link do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light"> <!-- bg-light deixa o fundo cinza clarinho moderno -->

    <div class="container mt-5">
        <div class="card shadow"> <!-- Card com sombra branca -->
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h3 class="mb-0">Usuários Cadastrados</h3>
                <a href="/logout" class="btn btn-danger btn-sm">Sair</a>
            </div>
            
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Nome</th>
                            <th>Hash da Senha</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for usuario in lista_usuarios %}
                        <tr>
                            <td class="align-middle"><strong>{{ usuario.nome }}</strong></td>
                            <td class="align-middle text-muted small">
                                <code>{{ usuario.senha[:20] }}...</code>
                            </td>
                            <td class="text-center">
                                <a href="/editar/{{ usuario.nome }}" class="btn btn-warning btn-sm">Editar</a>
                                <a href="/excluir/{{ usuario.nome }}" 
                                    class="btn btn-outline-danger btn-sm" 
                                    onclick="return confirmarExclusao('{{ usuario.nome }}')">
                                    Excluir
                                </a>                            
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                
                <div class="mt-4 text-center">
                    <a href="/" class="btn btn-success">+ Novo Cadastro</a>
                </div>
            </div>
        </div>
    </div>

    <script>
    // Função para dar um alerta visual antes de deletar
    function confirmarExclusao(nome) {
        if (confirm("Tem certeza que deseja excluir o usuário " + nome + "?")) {
            return true;
        }
        return false;
    }
    </script>

</body>
</html>
