<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Lista de Usuários</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="cadastro-container" style="max-width: 600px;">
        <h2>Usuários Cadastrados</h2>
        
        <table border="1" style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Senha</th>
                </tr>
            </thead>
            <tbody>
                {% for usuario in lista_usuarios %}
                <tr>
                    <td style="padding: 10px; text-align: center;">{{ usuario.nome }}</td>
                    <td style="padding: 10px; text-align: center;">{{ usuario.senha }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="/" style="display: block; text-align: center; color: #007bff; text-decoration: none;">Cadastrar Novo</a>
    </div>
    
    <table border="1" style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
    <thead>
        <tr>
            <th>Nome</th>
            <th>Senha</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for usuario in lista_usuarios %}
        <tr>
            <td style="padding: 10px; text-align: center;">{{ usuario.nome }}</td>
            <td style="padding: 10px; text-align: center;">{{ usuario.senha }}</td>
            <td style="padding: 10px; text-align: center;">
                <a href="/editar/{{ usuario.nome }}" 
                style="color: #007bff; text-decoration: none; font-weight: bold; margin-right: 15px;">
                   Editar
                </a>
                <a href="/excluir/{{ usuario.nome }}" 
                   style="color: red; text-decoration: none; font-weight: bold;"
                   onclick="return confirm('Tem certeza que deseja excluir {{ usuario.nome }}?')">
                   Excluir
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</body>
</html>
