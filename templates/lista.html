<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Usuários</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="cadastro-container" style="max-width: 800px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Usuários do Sistema</h2>
            <a href="/logout" style="color: #e74c3c; text-decoration: none; font-weight: bold; border: 1px solid #e74c3c; padding: 5px 10px; border-radius: 5px;">Sair</a>
        </div>

        <table border="1" style="width: 100%; border-collapse: collapse; margin-bottom: 20px; background-color: white;">
            <thead>
                <tr style="background-color: #f8f9fa;">
                    <th style="padding: 12px;">Nome</th>
                    <th style="padding: 12px;">Senha (Hash)</th>
                    <th style="padding: 12px;">Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for usuario in lista_usuarios %}
                <tr>
                    <td style="padding: 10px; text-align: center; font-weight: bold;">{{ usuario.nome }}</td>
                    <td style="padding: 10px; text-align: center; color: #666; font-size: 0.8em;">
                        <div style="width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0 auto;">
                            {{ usuario.senha }}
                        </div>
                    </td>
                    <td style="padding: 10px; text-align: center;">
                        <a href="/editar/{{ usuario.nome }}" style="color: #2980b9; text-decoration: none; font-weight: bold; margin-right: 15px;">Editar</a>
                        
                        <a href="/excluir/{{ usuario.nome }}" 
                           style="color: #c0392b; text-decoration: none; font-weight: bold;"
                           onclick="return confirm('Tem certeza que deseja excluir {{ usuario.nome }}?')">
                           Excluir
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div style="text-align: center;">
            <a href="/" style="color: #27ae60; text-decoration: none; font-weight: bold;">+ Cadastrar Novo Usuário</a>
        </div>
    </div>
</body>
</html>
